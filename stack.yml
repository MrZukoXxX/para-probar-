version: "3.9"

services:
  app:
    image: ghcr.io/mrzukoxxx/para-probar:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: angelo
      POSTGRES_USER: angelo
      POSTGRES_PASSWORD: angelo123
      FLASK_SECRET_KEY: change-me-before-production
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.services.app.loadbalancer.server.port=5000"
      - "traefik.http.services.app.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.app.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.app.loadbalancer.healthcheck.timeout=3s"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.angelo.rule=Host(`angeltroy.byronrm.com`)"
      - "traefik.http.routers.angelo.entrypoints=web"
      - "traefik.http.routers.angelo.middlewares=redirect-to-https"
      - "traefik.http.routers.angelo-secure.rule=Host(`angeltroy.byronrm.com`)"
      - "traefik.http.routers.angelo-secure.entrypoints=websecure"
      - "traefik.http.routers.angelo-secure.tls=true"
      - "traefik.http.routers.angelo-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.angelo-secure.service=app"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: angelo
      POSTGRES_USER: angelo
      POSTGRES_PASSWORD: angelo123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@byronrm.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.http.middlewares.pgadmin-redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.pgadmin.rule=Host(`pgangeltroy.byronrm.com`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"
      - "traefik.http.routers.pgadmin.middlewares=pgadmin-redirect-to-https"
      - "traefik.http.routers.pgadmin-secure.rule=Host(`pgangeltroy.byronrm.com`)"
      - "traefik.http.routers.pgadmin-secure.entrypoints=websecure"
      - "traefik.http.routers.pgadmin-secure.tls=true"
      - "traefik.http.routers.pgadmin-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pgadmin-secure.service=pgadmin"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  postgres_data:

networks:
  traefik-public:
    external: true
