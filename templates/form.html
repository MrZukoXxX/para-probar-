<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Angel & Troy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #e2e8f0; }
        .card { background: #111827; border: 1px solid #334155; }
        .btn-brand { background: #2563eb; color: #fff; }
        .btn-brand:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="card p-4 shadow-sm mx-auto" style="max-width: 720px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 mb-1">{{ title }}</h1>
                <p class="text-muted mb-0">Registra o actualiza un producto para tu catálogo.</p>
            </div>
            <a href="/" class="btn btn-outline-light">Volver</a>
        </div>
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="name" value="{{ product.name if product else '' }}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Categoría</label>
                    <input type="text" name="category" value="{{ product.category if product else '' }}" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    <textarea name="description" class="form-control" rows="4">{{ product.description if product else '' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Precio</label>
                    <input type="number" step="0.01" name="price" value="{{ product.price if product else '0.00' }}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" value="{{ product.stock if product else '0' }}" class="form-control" required>
                </div>
            </div>
            <div class="mt-4 d-flex justify-content-between">
                <a href="/" class="btn btn-outline-light">Cancelar</a>
                <button type="submit" class="btn btn-brand">Guardar</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
