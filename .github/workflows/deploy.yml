name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Iniciar sesión en el registro de contenedores
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 3. Generar etiquetas y metadata para Docker
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=1.0.0
            type=raw,value=latest

      # 4. Construir la imagen y subirla a GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 5. Probar la conexión SSH en el VPS
      - name: Probar la conexión SSH en el VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "probando conexion ssh..."
            mkdir -p ~/landinga
            touch ~/landinga/quintoa.txt

      # 6. Copiar archivos desde Git al VPS
      - name: Copiar archivos al VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml,Makefile"
          target: "/home/${{ secrets.VPS_USER }}/landinga"

      # 7. Desplegar servicios en el VPS
      - name: Despliegue de los servicios
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "✅ Desplegando servicios"
            mkdir -p /home/${{ secrets.VPS_USER }}/landinga
            cd /home/${{ secrets.VPS_USER }}/landinga

            echo "==> Iniciando sesión en GHCR..."
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              printf "%s" "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            else
              echo "GHCR_PAT no configurado; continuando con la imagen pública"
            fi

            echo "==> Asegurando la red de Swarm..."
            docker network inspect traefik-public >/dev/null 2>&1 || docker network create --driver overlay --attachable traefik-public

            echo "==> Descargando la imagen..."
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "==> Desplegando stack..."
            docker stack deploy --with-registry-auth -c stack.yml borrar
